<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Dr. Halhali - Assistant Médical</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#eef3f8;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Container */
.chat-container{
    width:100%;
    height:100vh;
    background:#fff;
    display:flex;
    flex-direction:column;
}

@media(min-width:768px){
    .chat-container{
        width:420px;
        height:90vh;
        border-radius:22px;
        overflow:hidden;
        box-shadow:0 10px 30px rgba(0,0,0,.12);
    }
}

/* Header */
.chat-header{
    background:linear-gradient(135deg,#0077b6,#0096c7);
    color:#fff;
    padding:18px;
    text-align:center;
    font-size:1rem;
    font-weight:600;
    letter-spacing:.3px;
}

/* Messages */
.chat-messages{
    flex:1;
    overflow-y:auto;
    padding:14px 12px;
    background:#f7fafc;
    display:flex;
    flex-direction:column;
    gap:6px; /* تقارب الرسائل */
}

/* Message Row */
.message-row{
    display:flex;
    width:100%;
}

.message-row.user{
    justify-content:flex-end;
}

.message-row.bot{
    justify-content:flex-start;
}

/* Bubble */
.message{
    max-width:78%;
    padding:10px 14px;
    border-radius:18px;
    line-height:1.45;
    font-size:.94rem;
    word-wrap:break-word;
    animation:fadeIn .18s ease;
}

/* User */
.message.user{
    background:#0077b6;
    color:white;
    border-bottom-right-radius:5px;
}

/* Bot */
.message.bot{
    background:white;
    color:#222;
    border:1px solid #e4e7eb;
    border-bottom-left-radius:5px;
    box-shadow:0 1px 3px rgba(0,0,0,.05);
}

.typing{
    opacity:.7;
    font-style:italic;
}

/* Input */
.chat-input-area{
    padding:12px;
    background:white;
    border-top:1px solid #e6e6e6;
    display:flex;
    gap:8px;
}

.chat-input-area input{
    flex:1;
    border:none;
    background:#f1f4f7;
    border-radius:20px;
    padding:13px 16px;
    outline:none;
    font-size:.95rem;
}

.chat-input-area button{
    border:none;
    background:#0077b6;
    color:white;
    border-radius:18px;
    padding:0 18px;
    cursor:pointer;
    font-weight:600;
    transition:.2s;
}

.chat-input-area button:hover{
    transform:scale(1.03);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(4px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="chat-container">

    <div class="chat-header">
        🩺 Dr. Halhali - Assistant Médical
    </div>

    <div class="chat-messages" id="chatBox">

        <div class="message-row bot">
            <div class="message bot">
                Bonjour ! Bienvenue au secrétariat virtuel du Dr. Halhali. Comment puis-je vous aider pour votre rendez-vous aujourd'hui ?
            </div>
        </div>

    </div>

    <div class="chat-input-area">
        <input
            type="text"
            id="userInput"
            placeholder="Écrivez votre message..."
        />

        <button id="sendBtn">
            Envoyer
        </button>
    </div>

</div>

<script>
const chatBox = document.getElementById("chatBox");
const input = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");

// رابط الـ Space
const API_URL = "https://klasiinkov-hlhli.hf.space/chat";

function addMessage(text, type){

    const row = document.createElement("div");
    row.className = `message-row ${type}`;

    const bubble = document.createElement("div");
    bubble.className = `message ${type}`;
    bubble.textContent = text;

    row.appendChild(bubble);
    chatBox.appendChild(row);

    chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendMessage(){

    const userMsg = input.value.trim();

    if(!userMsg) return;

    addMessage(userMsg, "user");

    input.value = "";

    // Loading قريب وغير مزعج
    const loadingRow = document.createElement("div");
    loadingRow.className = "message-row bot";
    loadingRow.id = "typing";

    loadingRow.innerHTML = `
        <div class="message bot typing">
            En cours de réflexion...
        </div>
    `;

    chatBox.appendChild(loadingRow);
    chatBox.scrollTop = chatBox.scrollHeight;

    try{

        const response = await fetch(API_URL,{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Accept":"application/json"
            },
            body:JSON.stringify({
                message:userMsg
            })
        });

        const data = await response.json();

        document.getElementById("typing")?.remove();

        addMessage(
            data.response || "Erreur de réponse serveur.",
            "bot"
        );

    }catch(error){

        console.error(error);

        document.getElementById("typing")?.remove();

        addMessage(
            "Erreur de connexion au serveur. Réessayez.",
            "bot"
        );
    }
}

sendBtn.addEventListener("click", sendMessage);

input.addEventListener("keydown", function(e){
    if(e.key === "Enter"){
        sendMessage();
    }
});
</script>

</body>
</html>
