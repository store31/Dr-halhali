<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cabinet Dr. Halhali - Assistant Virtuel</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f4f8; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 450px; height: 100vh; background: white; display: flex; flex-direction: column; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        @media (min-width: 460px) { .chat-container { height: 85vh; border-radius: 12px; overflow: hidden; } }
        .chat-header { background: #0077b6; color: white; padding: 15px; text-align: center; font-size: 1.1rem; font-weight: bold; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; background: #f7f9fc; display: flex; flex-direction: column; gap: 12px; }
        .message-row { display: flex; width: 100%; }
        .message-row.user { justify-content: flex-end; }
        .message-row.bot { justify-content: flex-start; }
        .message { padding: 10px 14px; border-radius: 15px; max-width: 75%; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; }
        .message.bot { background: #e2eafc; color: #333; border-bottom-left-radius: 2px; }
        .message.user { background: #0077b6; color: white; border-bottom-right-radius: 2px; }
        .message.typing { color: #777; font-style: italic; }
        .chat-input-area { display: flex; padding: 10px; background: #fff; border-top: 1px solid #ddd; gap: 8px; }
        .chat-input-area input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 20px; outline: none; font-size: 0.95rem; }
        .chat-input-area button { background: #0077b6; color: white; border: none; padding: 0 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">🩺 Dr. Halhali - Assistant Médical</div>
    <div class="chat-messages" id="chatBox">
        <div class="message-row bot">
            <div class="message bot">Bonjour ! Bienvenue au secrétariat virtuel du Dr. Halhali. Comment puis-je vous aider pour votre rendez-vous aujourd'hui ?</div>
        </div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="userInput" placeholder="Écrivez votre message ici..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Envoyer</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById("chatBox");
    const input = document.getElementById("userInput");

    function addMessage(text, type) {
        const row = document.createElement("div");
        row.className = `message-row ${type}`;
        const bubble = document.createElement("div");
        bubble.className = `message ${type}`;
        bubble.textContent = text;
        row.appendChild(bubble);
        chatBox.appendChild(row);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const userMsg = input.value.trim();
        if (!userMsg) return;

        addMessage(userMsg, "user");
        input.value = "";

        const loadingRow = document.createElement("div");
        loadingRow.className = "message-row bot";
        loadingRow.id = "typing";
        loadingRow.innerHTML = `<div class="message bot typing">En cours de réflexion...</div>`;
        chatBox.appendChild(loadingRow);
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch("https://text.pollinations.ai/", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    messages: [
                        {
                            role: "system",
                            content: "Tu es l'assistante médicale virtuelle du Cabinet Dr. Halhali, spécialiste en Néphrologie. Tu parles uniquement en Français de manière très professionnelle, chaleureuse et polie. Ton rôle est d'aider les patients à prendre rendez-vous, leur demander leur nom complet, numéro de téléphone, et le motif de consultation. Ne réponds jamais à côté de ton rôle médical."
                        },
                        { role: "user", content: userMsg }
                    ],
                    model: "openai",
                    private: true
                })
            });

            document.getElementById("typing").remove();
            const reply = await response.text();
            addMessage(reply, "bot");

        } catch (e) {
            document.getElementById("typing").remove();
            addMessage("Désolé, service temporairement indisponible. Réessayez.", "bot");
        }
    }
</script>

</body>
</html>
