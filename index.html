<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cabinet Dr. Halhali - Assistant Virtuel</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f4f8; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* الواجهة تولي تعمر شاشة التيليفون كاملة 100% وبلا فراغات بيضاء ف الجوانب */
        .chat-container { width: 100%; height: 100vh; background: white; display: flex; flex-direction: column; }
        
        /* ف الشاشات الكبيرة تع الميكرو برك يتلم ف الوسط باه يجي شباب */
        @media (min-width: 768px) { 
            .chat-container { width: 450px; height: 85vh; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); } 
        }

        .chat-header { background: #0077b6; color: white; padding: 15px; text-align: center; font-size: 1.1rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; background: #f7f9fc; display: flex; flex-direction: column; gap: 10px; }
        
        .message { padding: 10px 14px; border-radius: 15px; max-width: 80%; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; }
        .message.bot { background: #e2eafc; align-self: flex-start; color: #333; border-bottom-left-radius: 4px; }
        .message.user { background: #0077b6; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        
        .chat-input-area { display: flex; padding: 12px; background: #fff; border-top: 1px solid #ddd; gap: 8px; box-shadow: 0 -2px 5px rgba(0,0,0,0.05); }
        .chat-input-area input { flex: 1; padding: 12px 16px; border: 1px solid #ccc; border-radius: 24px; outline: none; font-size: 0.95rem; }
        .chat-input-area button { background: #0077b6; color: white; border: none; padding: 0 22px; border-radius: 24px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">🩺 Dr. Halhali - Assistant Médical</div>
    <div class="chat-messages" id="chatBox">
        <div class="message bot">Bonjour! Bienvenue au secrétariat virtuel du Dr. Halhali. Comment puis-je vous aider pour votre rendez-vous aujourd'hui ?</div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="userInput" placeholder="Écrivez votre message ici..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Envoyer</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById("chatBox");

    async function sendMessage() {
        const input = document.getElementById("userInput");
        const userMsg = input.value.trim();
        if (!userMsg) return;

        chatBox.innerHTML += `<div class="message user">${userMsg}</div>`;
        input.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        const loadingId = "load_" + Date.now();
        chatBox.innerHTML += `<div class="message bot" id="${loadingId}"><i>En cours de réflexion...</i></div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // تصحيح الرابط لـ /run/predict باه يتوافق مع الـ Gradio Interface ديريكت
            const response = await fetch("https://klasiinkov-hlhli.hf.space/run/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ data: [userMsg] })
            });
            
            const result = await response.json();
            const botResponse = result.data[0];

            document.getElementById(loadingId).remove();
            chatBox.innerHTML += `<div class="message bot">${botResponse}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch(e) {
            if(document.getElementById(loadingId)) document.getElementById(loadingId).remove();
            chatBox.innerHTML += `<div class="message bot" style="color:red;">Erreur de connexion au serveur. Réessayez.</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }
</script>

</body>
</html>
