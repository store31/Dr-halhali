<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Cabinet Dr. Halhali - Assistant Virtuel</title>

    <style>
        *{
            box-sizing:border-box;
            margin:0;
            padding:0;
            font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
        }

        body{
            background:#f0f4f8;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            overflow:hidden;
        }

        .chat-container{
            width:100%;
            height:100vh;
            background:#fff;
            display:flex;
            flex-direction:column;
        }

        @media (min-width:768px){
            .chat-container{
                width:450px;
                height:85vh;
                border-radius:12px;
                overflow:hidden;
                box-shadow:0 5px 15px rgba(0,0,0,0.15);
            }
        }

        .chat-header{
            background:#0077b6;
            color:#fff;
            padding:16px;
            text-align:center;
            font-size:1.05rem;
            font-weight:bold;
        }

        .chat-messages{
            flex:1;
            overflow-y:auto;
            padding:15px;
            background:#f7f9fc;
            display:flex;
            flex-direction:column;
            gap:10px;
        }

        .message{
            padding:12px 15px;
            border-radius:16px;
            max-width:80%;
            font-size:.95rem;
            line-height:1.4;
            word-wrap:break-word;
        }

        .bot{
            background:#e2eafc;
            color:#333;
            align-self:flex-start;
            border-bottom-left-radius:5px;
        }

        .user{
            background:#0077b6;
            color:#fff;
            align-self:flex-end;
            border-bottom-right-radius:5px;
        }

        .chat-input-area{
            display:flex;
            gap:8px;
            padding:12px;
            border-top:1px solid #ddd;
            background:#fff;
        }

        .chat-input-area input{
            flex:1;
            padding:12px 16px;
            border:1px solid #ccc;
            border-radius:24px;
            outline:none;
            font-size:.95rem;
        }

        .chat-input-area button{
            border:none;
            background:#0077b6;
            color:#fff;
            border-radius:24px;
            padding:0 22px;
            font-weight:bold;
            cursor:pointer;
        }

        .typing{
            opacity:.7;
            font-style:italic;
        }
    </style>
</head>

<body>

<div class="chat-container">

    <div class="chat-header">
        🩺 Dr. Halhali - Assistant Médical
    </div>

    <div class="chat-messages" id="chatBox">
        <div class="message bot">
            Bonjour ! Bienvenue au secrétariat virtuel du Dr. Halhali.
            Comment puis-je vous aider pour votre rendez-vous aujourd'hui ?
        </div>
    </div>

    <div class="chat-input-area">
        <input
            type="text"
            id="userInput"
            placeholder="Écrivez votre message ici..."
        />

        <button id="sendBtn">
            Envoyer
        </button>
    </div>

</div>

<script>
const chatBox = document.getElementById("chatBox");
const input = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");

// ضع رابط Space الصحيح هنا
const API_URL = "https://klasiinkov-hlhli.hf.space/chat";

function addMessage(text, type){
    const div = document.createElement("div");
    div.className = `message ${type}`;
    div.textContent = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

async function sendMessage(){

    const userMsg = input.value.trim();

    if(!userMsg) return;

    addMessage(userMsg, "user");
    input.value = "";

    const loadingDiv = document.createElement("div");
    loadingDiv.className = "message bot typing";
    loadingDiv.id = "typing";
    loadingDiv.textContent = "En cours de réflexion...";
    chatBox.appendChild(loadingDiv);
    chatBox.scrollTop = chatBox.scrollHeight;

    try{

        const response = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: userMsg
            })
        });

        const data = await response.json();

        const typing = document.getElementById("typing");
        if(typing) typing.remove();

        addMessage(
            data.response || "Erreur de réponse serveur.",
            "bot"
        );

    } catch(error){

        const typing = document.getElementById("typing");
        if(typing) typing.remove();

        addMessage(
            "Erreur de connexion au serveur. Réessayez.",
            "bot"
        );

        console.error(error);
    }
}

sendBtn.addEventListener("click", sendMessage);

input.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        sendMessage();
    }
});
</script>

</body>
</html>
