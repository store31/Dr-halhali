<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabinet Dr. Halhali - Assistant Virtuel</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 450px; height: 85vh; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: #0077b6; color: white; padding: 15px; text-align: center; font-size: 1.1rem; font-weight: bold; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 14px; border-radius: 15px; max-width: 75%; font-size: 0.95rem; line-height: 1.4; }
        .message.bot { background: #e2eafc; align-self: flex-start; color: #333; }
        .message.user { background: #0077b6; color: white; align-self: flex-end; }
        .chat-input-area { display: flex; padding: 10px; background: #f8f9fa; border-top: 1px solid #ddd; }
        .chat-input-area input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; padding-left: 15px; }
        .chat-input-area button { background: #0077b6; color: white; border: none; padding: 0 20px; margin-left: 5px; border-radius: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">🩺 Dr. Halhali - Assistant Médical Virtual</div>
    <div class="chat-messages" id="chatBox">
        <div class="message bot">Bonjour! Bienvenue au secrétariat virtuel du Dr. Halhali. Comment puis-je vous aider pour votre rendez-vous aujourd'hui ?</div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="userInput" placeholder="Écrivez votre message ici...">
        <button onclick="sendMessage()">Envoyer</button>
    </div>
</div>

<script>
    const chatId = "web_" + Math.random().toString(36).substring(7);
    
    async function sendMessage() {
        const input = document.getElementById("userInput");
        const chatBox = document.getElementById("chatBox");
        if(!input.value.trim()) return;

        // رسالة المستخدم
        chatBox.innerHTML += `<div class="message user">${input.value}</div>`;
        const userMsg = input.value;
        input.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        // إرسال للـ Backend ف الـ Space ديريكت
        try {
            const response = await fetch("https://klasiinkov-hlhli.hf.space/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: userMsg, chat_id: chatId })
            });
            const data = await response.json();
            chatBox.innerHTML += `<div class="message bot">${data.response}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch(e) {
            chatBox.innerHTML += `<div class="message bot">Erreur de connexion au serveur.</div>`;
        }
    }
</script>
</body>
</html>
